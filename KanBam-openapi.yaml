          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: There is no content to send for this request, but the headers may be useful.
        '401':
          description: Auth Missing
          content:
            application/json:
              schema:
                anyOf:
                  - $ref: '#/components/schemas/Errors.AuthMissing'
                  - $ref: '#/components/schemas/Errors.NotAuthorized'
        '404':
          description: The server cannot find the requested resource.
          content:
