openapi: 3.1.0
info:
  title: KanBam REST API
  version: 0.0.0
tags:
  - name: Authentication
  - name: Workspaces
  - name: Boards
  - name: Tags
  - name: Activity
  - name: Columns
  - name: Cards
  - name: Comments
paths:
  /api/v1/activity/{activityID}:
    get:
      operationId: Activity_getActivityWithID
      summary: Get Activity Entry
      description: Gets details about a specific activity entry.
      parameters:
        - name: activityID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: The specified activity entry.
          content:
            application/json:
              schema: {}
        '401':
          description: Auth Missing
          content:
            application/json:
              schema:
                anyOf:
                  - $ref: '#/components/schemas/Errors.AuthMissing'
                  - $ref: '#/components/schemas/Errors.NotAuthorized'
        '404':
          description: The server cannot find the requested resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors.ActivityNotFound'
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors.Error'
      tags:
        - Activity
      security:
        - BearerAuth: []
  /api/v1/auth/login:
    post:
      operationId: Auth_login
      summary: Get User Access Token
      description: Authenticates and provides a JWT for the authorized user.
      parameters: []
      responses:
        '200':
          description: The authenticated users information, including an Auth token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Models.UserToken'
        '401':
          description: Invalid Username or Passoword
          content:
            application/json:
              schema:
                anyOf:
                  - $ref: '#/components/schemas/Errors.InvalidCredentials'
                  - $ref: '#/components/schemas/Errors.AuthMissing'
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors.Error'
      tags:
        - Authentication
      security:
        - BasicAuth: []
  /api/v1/auth/register:
    post:
      operationId: Auth_register
      summary: Register User
      description: Registers a new user with this service.
      parameters: []
      responses:
        '201':
          description: The registered users infomration, including an Auth token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Models.UserToken'
        '409':
          description: The request conflicts with the current state of the server.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors.EmailTaken'
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors.Error'
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Models.Registration'
  /api/v1/auth/updatePassword:
    post:
      operationId: Auth_updatePassword
      summary: Update User Password
      description: Updates the authenticated users current password.
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
        '401':
          description: Auth Missing
          content:
            application/json:
              schema:
                anyOf:
                  - $ref: '#/components/schemas/Errors.AuthMissing'
                  - $ref: '#/components/schemas/Errors.InvalidPassword'
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors.Error'
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Models.UpdatePassword'
      security:
        - BearerAuth: []
  /api/v1/boards/boards/{boardID}/activity:
    get:
      operationId: Activity_getBoardActivity
      summary: Get Board Activity
      description: Gets all activity on the specified board. Results can be narrowed to a specific card or user, and filtered by date range.
      parameters:
        - name: boardID
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: cardID
          in: query
          required: false
          schema:
            type: string
            format: uuid
          explode: false
        - name: userID
          in: query
          required: false
          schema:
            type: string
            format: uuid
          explode: false
        - name: after
          in: query
          required: false
          schema:
            type: string
            format: ISO8601
          explode: false
        - name: before
          in: query
          required: false
          schema:
            type: string
            format: ISO8601
          explode: false
      responses:
        '200':
          description: The activity entries matching the given filters.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Models.Activities'
        '401':
          description: Auth Missing
          content:
            application/json:
              schema:
                anyOf:
                  - $ref: '#/components/schemas/Errors.AuthMissing'
                  - $ref: '#/components/schemas/Errors.NotAuthorized'
        '404':
          description: The server cannot find the requested resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors.BoardNotFound'
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors.Error'
      tags:
        - Boards
        - Activity
      security:
        - BearerAuth: []
