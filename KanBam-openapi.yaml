components:
  schemas:
    Errors.ActivityNotFound:
      type: object
      allOf:
        - $ref: '#/components/schemas/Errors.Error'
      examples:
        - code: ACTIVITY_NOT_FOUND
          reason: The specified activity entry does not exist.
    Errors.AuthMissing:
      type: object
      allOf:
        - $ref: '#/components/schemas/Errors.Error'
      description: Auth Missing
      examples:
        - code: INVALID_AUTH
          reason: Authentication is missing or malformed
    Errors.BoardNotFound:
      type: object
      allOf:
        - $ref: '#/components/schemas/Errors.Error'
      examples:
        - code: BOARD_NOT_FOUND
          reason: The specified board does not exist.
    Errors.BoardPrefixTaken:
      type: object
      allOf:
        - $ref: '#/components/schemas/Errors.Error'
      examples:
        - code: BOARD_PREFIX_TAKEN
          reason: A board with this prefix already exists in this workspace.
    Errors.CardNotFound:
      type: object
      allOf:
        - $ref: '#/components/schemas/Errors.Error'
      examples:
        - code: CARD_NOT_FOUND
          reason: The specified card does not exist.
    Errors.ColumnNotFound:
      type: object
      allOf:
        - $ref: '#/components/schemas/Errors.Error'
      examples:
        - code: COLUMN_NOT_FOUND
          reason: The specified column does not exist.
    Errors.CommentNotFound:
      type: object
      allOf:
        - $ref: '#/components/schemas/Errors.Error'
      examples:
        - code: COMMENT_NOT_FOUND
          reason: The specified comment does not exist.
    Errors.EmailTaken:
      type: object
      allOf:
        - $ref: '#/components/schemas/Errors.Error'
      examples:
        - code: EMAIL_TAKEN
          reason: This email is already in use.
    Errors.Error:
      type: object
      required:
        - code
        - reason
      properties:
        code:
          type: string
        reason:
          type: string
    Errors.InvalidCredentials:
      type: object
      allOf:
        - $ref: '#/components/schemas/Errors.Error'
      description: Invalid Username or Passoword
      examples:
        - code: INVALID_CREDENTIALS
          reason: Invalid username or password provided.
    Errors.InvalidPassword:
      type: object
      allOf:
        - $ref: '#/components/schemas/Errors.Error'
      description: Invalid Password
      examples:
        - code: INVALID_PASSWORD
          reason: Current password is incorrect
    Errors.NotAuthorized:
      type: object
      allOf:
        - $ref: '#/components/schemas/Errors.Error'
      description: User Cannot Perform This Action
      examples:
        - code: NOT_AUTHORIZED
          reason: This user does not have permission to perform this action in this workspace.
    Errors.TagNameTaken:
      type: object
      allOf:
        - $ref: '#/components/schemas/Errors.Error'
      examples:
        - code: TAG_NAME_TAKEN
          reason: A tag with this name already exists in this workspace.
    Errors.TagNotFound:
      type: object
      allOf:
        - $ref: '#/components/schemas/Errors.Error'
      examples:
        - code: TAG_NOT_FOUND
          reason: The specified tag does not exist.
    Errors.UserAlreadyInWorkspace:
      type: object
      allOf:
        - $ref: '#/components/schemas/Errors.Error'
      examples:
        - code: ALREADY_IN_WORKSPACE
          reason: This user has already been invited to this workspace.
    Models.Activities:
      type: object
      required:
        - activities
      properties:
        activities:
          type: array
          items:
            $ref: '#/components/schemas/Models.Activity'
    Models.Activity:
      type: object
      required:
        - id
        - workspaceID
        - description
        - createdAt
      properties:
        id:
          type: string
          format: uuid
        workspaceID:
          type: string
          format: uuid
        userID:
          type: string
          format: uuid
        boardID:
          type: string
          format: uuid
        columnID:
          type: string
          format: uuid
        cardID:
          type: string
          format: uuid
        commentID:
          type: string
          format: uuid
        tagID:
          type: string
          format: uuid
        description:
          type: string
        createdAt:
          type: string
          format: ISO8601
    Models.Board:
      type: object
      required:
        - id
        - title
        - prefix
        - sequence
        - isArchived
        - workspaceID
        - createdAt
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
        prefix:
          type: string
          minLength: 3
        sequence:
          type: integer
        isArchived:
          type: boolean
        workspaceID:
          type: string
          format: uuid
