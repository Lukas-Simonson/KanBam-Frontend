          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors.BoardNotFound'
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors.Error'
      tags:
        - Boards
      requestBody:
        required: true
        content:
          application/json:
            schema:
